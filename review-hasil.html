<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembahasan Ujian V2 - SmartKhairunnas</title>
    <link href="style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        .ql-editor { padding: 0 !important; font-family: inherit !important; font-size: inherit !important; line-height: 1.7; }
        .ql-editor p { margin-bottom: 0.5rem; }
        .ql-formula { display: inline-block; background: #f8fafc; padding: 0.1rem 0.3rem; border-radius: 0.25rem; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen font-sans text-gray-800">

    <header class="bg-white shadow-sm border-b border-gray-200 px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center">
            <a href="riwayat-ujian.html" class="mr-3 md:mr-4 text-gray-400 hover:text-blue-600 transition p-2 bg-gray-50 rounded-full hover:bg-blue-50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
                <h1 class="text-base md:text-xl font-black text-blue-600 leading-tight" id="judulHeader">Memuat Data...</h1>
                <p class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-widest mt-0.5">Arsip & Pembahasan V2</p>
            </div>
        </div>
        <div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-xl font-black text-xl shadow-sm border border-blue-200" id="skorBadge">
            --
        </div>
    </header>

    <main class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-6 lg:p-8">
        
        <div id="panelFilter" class="hidden flex flex-wrap gap-2 mb-6 bg-white p-2 rounded-2xl shadow-sm border border-gray-100">
            <button onclick="filterSoal('semua')" id="btn-filter-semua" class="px-4 py-2 text-xs md:text-sm font-bold rounded-xl transition bg-gray-800 text-white shadow-sm flex-1 md:flex-none">Semua Soal</button>
            <button onclick="filterSoal('benar')" id="btn-filter-benar" class="px-4 py-2 text-xs md:text-sm font-bold rounded-xl transition bg-gray-50 text-gray-600 hover:bg-green-50 hover:text-green-700 border border-gray-200 flex-1 md:flex-none">✅ Benar</button>
            <button onclick="filterSoal('salah')" id="btn-filter-salah" class="px-4 py-2 text-xs md:text-sm font-bold rounded-xl transition bg-gray-50 text-gray-600 hover:bg-red-50 hover:text-red-700 border border-gray-200 flex-1 md:flex-none">❌ Salah</button>
            <button onclick="filterSoal('kosong')" id="btn-filter-kosong" class="px-4 py-2 text-xs md:text-sm font-bold rounded-xl transition bg-gray-50 text-gray-600 hover:bg-gray-200 hover:text-gray-800 border border-gray-200 flex-1 md:flex-none">⬜ Kosong / Essay</button>
        </div>

        <div id="kontainerPembahasan" class="space-y-6 pb-20">
            <div class="text-center py-20 text-gray-500 animate-pulse font-bold">Membongkar arsip ujian dari brankas server...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const app = initializeApp({ apiKey: "AIzaSyCTd3H3E9baMGDQpHbJDBFzupuSaIUn0v0", authDomain: "smartkhairunnas.firebaseapp.com", projectId: "smartkhairunnas", storageBucket: "smartkhairunnas.firebasestorage.app", messagingSenderId: "3009868062", appId: "1:3009868062:web:f6d158a8aa60fabf91590f" });
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const idHasil = urlParams.get('id');
        let usernameSiswaAktif = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) { usernameSiswaAktif = user.email.split('@')[0]; muatPembahasan(); } 
            else { Swal.fire('Sesi Berakhir', 'Silakan login kembali.', 'warning').then(()=>window.location.replace("index.html")); }
        });

        // ==========================================
        // MESIN BONGKAR ARSIP (METODE SNAPSHOT)
        // ==========================================
        async function muatPembahasan() {
            if (!idHasil) return Swal.fire('Error', 'ID Ujian tidak ditemukan di URL!', 'error').then(()=>window.location.href='riwayat-ujian.html');

            try {
                const docRef = doc(db, "hasil_ujian", idHasil);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();

                    if (data.username !== usernameSiswaAktif) {
                        return Swal.fire({ icon: 'error', title: 'Akses Ilegal!', text: 'Anda tidak diizinkan melihat arsip ujian milik siswa lain.', confirmButtonColor: '#d33' }).then(()=>window.location.replace("riwayat-ujian.html"));
                    }

                    let nilai = data.nilai_akhir !== undefined ? data.nilai_akhir : (data.skor_akhir || 0);
                    document.getElementById('skorBadge').innerText = nilai;
                    document.getElementById('judulHeader').innerText = data.nama_ujian || "Review Ujian";
                    document.getElementById('panelFilter').classList.remove('hidden');
                    
                    // MENARIK SNAPSHOT SOAL DARI MEMORI
                    let soalArray = data.rekam_soal || [];
                    const jawabanArray = data.rekam_jawaban || {}; 

                    // Fallback Pintar: Jika ini adalah data jadul sebelum fitur Snapshot diaktifkan
                    if (soalArray.length === 0 && data.id_paket) {
                        const pDoc = await getDoc(doc(db, "paket_soal", data.id_paket));
                        if(pDoc.exists()) {
                            const arrIdSoal = pDoc.data().soal_ids || [];
                            for(let i=0; i<arrIdSoal.length; i++){
                                const sDoc = await getDoc(doc(db, "bank_soal", arrIdSoal[i]));
                                if(sDoc.exists()) soalArray.push(sDoc.data());
                                else soalArray.push({ pertanyaan: "<i>Soal telah dihapus oleh Admin dari Bank Soal.</i>", tipe_soal: 'pg' });
                            }
                        }
                    }

                    if (soalArray.length === 0) {
                        document.getElementById('kontainerPembahasan').innerHTML = `<div class="bg-yellow-50 text-yellow-700 p-8 rounded-3xl text-center border border-yellow-200 font-medium">Maaf, data soal untuk arsip ujian ini sudah tidak dapat diakses.</div>`;
                        document.getElementById('panelFilter').classList.add('hidden');
                        return;
                    }

                    const kontainer = document.getElementById('kontainerPembahasan');
                    kontainer.innerHTML = '';

                    soalArray.forEach((soal, i) => {
                        let jwbSiswa = jawabanArray[i];
                        let tipe = soal.tipe_soal || 'pg';
                        
                        let isBenar = false;
                        let kunciTampil = "";
                        let jawabTampil = "";

                        // SKORING ULANG UNTUK TAMPILAN
                        // SKORING ULANG UNTUK TAMPILAN
                        if (tipe === 'pg_kompleks') {
                            let kunciBenarArr = soal.opsi ? soal.opsi.filter(o => o.benar).map(o => o.label).sort() : [];
                            let jwbSiswaArr = jwbSiswa ? [...jwbSiswa].sort() : [];
                            isBenar = JSON.stringify(kunciBenarArr) === JSON.stringify(jwbSiswaArr);
                            
                            kunciTampil = kunciBenarArr.join(', ');
                            jawabTampil = jwbSiswaArr.length > 0 ? jwbSiswaArr.join(', ') : 'Kosong';
                        } 
                        else if (tipe === 'pgk_matriks') {
                            // TIPE BARU: MATRIKS BENAR SALAH
                            let barisKunciArr = [];
                            let barisJawabArr = [];
                            let adaYangSalah = false;
                            
                            if(soal.opsi) {
                                soal.opsi.forEach(op => {
                                    barisKunciArr.push(`Baris ${op.label}: ${op.benar}`);
                                    
                                    let ansSiswa = (jwbSiswa && jwbSiswa[op.label]) ? jwbSiswa[op.label] : "Kosong";
                                    barisJawabArr.push(`Baris ${op.label}: ${ansSiswa}`);
                                    
                                    if(ansSiswa !== op.benar) adaYangSalah = true;
                                });
                            }
                            
                            let jmlDiisi = jwbSiswa ? Object.keys(jwbSiswa).length : 0;
                            let jmlBarisMatriks = soal.opsi ? soal.opsi.length : 0;
                            
                            if (jmlDiisi === 0) { isBenar = false; jwbSiswa = null; } 
                            else if (!adaYangSalah && jmlDiisi === jmlBarisMatriks) { isBenar = true; } 
                            else { isBenar = false; }
                            
                            kunciTampil = barisKunciArr.join(' <br> ');
                            jawabTampil = barisJawabArr.join(' <br> ');
                        }
                        else if (tipe === 'essay') {
                            isBenar = null; 
                            kunciTampil = "<i>Evaluasi manual oleh guru.</i>";
                            jawabTampil = jwbSiswa || 'Kosong';
                        } 
                        else {
                            // TIPE PG BIASA
                            let kunciMurni = soal.kunci;
                            if(soal.opsi && Array.isArray(soal.opsi)) {
                                let opt = soal.opsi.find(o => o.benar);
                                if(opt) kunciMurni = opt.label;
                            }
                            isBenar = (jwbSiswa === kunciMurni);
                            kunciTampil = kunciMurni || '?';
                            jawabTampil = jwbSiswa || 'Kosong';
                        }

                        // DESAIN UI
                        let kelasStatus = (!jwbSiswa || jwbSiswa.length === 0 || (tipe === 'pgk_matriks' && Object.keys(jwbSiswa||{}).length === 0)) ? "status-kosong" : (isBenar === null ? "status-kosong" : (isBenar ? "status-benar" : "status-salah"));
                        let iconStatus = (!jwbSiswa || jwbSiswa.length === 0 || (tipe === 'pgk_matriks' && Object.keys(jwbSiswa||{}).length === 0)) ? '⬜ KOSONG' : (isBenar === null ? '⏳ ESSAY' : (isBenar ? '✅ BENAR' : '❌ SALAH'));
                        let warnaBorder = kelasStatus === "status-kosong" ? 'border-gray-200 bg-gray-50/50' : (isBenar === null ? 'border-purple-200 bg-purple-50/30' : (isBenar ? 'border-green-200 bg-green-50/30' : 'border-red-200 bg-red-50/30'));
                        let warnaLabel = kelasStatus === "status-kosong" ? 'text-gray-600 bg-gray-200' : (isBenar === null ? 'text-purple-700 bg-purple-100' : (isBenar ? 'text-green-700 bg-green-100' : 'text-red-700 bg-red-100'));
                        let warnaJawab = isBenar === null ? 'text-gray-600' : (isBenar ? 'text-green-600' : 'text-red-600');

                        let htmlTanya = soal.pertanyaan && !soal.pertanyaan.startsWith('<') ? `<p>${soal.pertanyaan}</p>` : (soal.pertanyaan || "");
                        let htmlBahas = soal.pembahasan && !soal.pembahasan.startsWith('<') ? `<p>${soal.pembahasan}</p>` : (soal.pembahasan || '<i class="text-gray-400">Guru belum menyertakan pembahasan khusus.</i>');

                        // PERBAIKAN: Mengatur rendering Teks vs HTML Kaya untuk Jawaban dan Kunci
                        let htmlJawabanSiswa = '';
                        let htmlKunciBenar = '';

                        if (tipe === 'essay') {
                            htmlJawabanSiswa = `<div class="mt-1 text-gray-800 font-medium whitespace-pre-wrap">${jawabTampil}</div>`;
                            htmlKunciBenar = `<div class="mt-1 text-gray-600 text-xs">${kunciTampil}</div>`;
                        } else if (tipe === 'pg_kompleks' || tipe === 'pgk_matriks') {
                            htmlJawabanSiswa = `<div class="text-sm font-bold leading-relaxed">${jawabTampil}</div>`;
                            htmlKunciBenar = `<div class="text-sm font-bold leading-relaxed">${kunciTampil}</div>`;
                        } else {
                            // Untuk PG Biasa: Kita render Label (A/B/C/D) dan Teks HTML-nya (opsi.teks) secara terpisah
                            let teksOptJwb = "Tidak ada teks opsi.";
                            let teksOptKunci = "Tidak ada teks opsi.";
                            
                            if (soal.opsi && Array.isArray(soal.opsi)) {
                                let findJ = soal.opsi.find(o => o.label === jawabTampil);
                                let findK = soal.opsi.find(o => o.label === kunciTampil);
                                if(findJ) teksOptJwb = findJ.teks;
                                if(findK) teksOptKunci = findK.teks;
                            } else {
                                // Kompatibilitas Soal Lama V1
                                teksOptJwb = soal['opsi_' + (jawabTampil || '').toLowerCase()] || "Pilihan dihapus.";
                                teksOptKunci = soal['opsi_' + (kunciTampil || '').toLowerCase()] || "Pilihan dihapus.";
                            }

                            if(jawabTampil === 'Kosong') {
                                htmlJawabanSiswa = `<b class="text-sm">KOSONG</b>`;
                            } else {
                                htmlJawabanSiswa = `<b class="text-sm mr-3 shrink-0 bg-white border-2 border-gray-300 w-8 h-8 flex items-center justify-center rounded-full shadow-sm">${jawabTampil}</b> <div class="ql-editor p-0 min-h-0 flex-1 overflow-x-auto text-sm" style="padding:0;">${teksOptJwb}</div>`;
                            }
                            htmlKunciBenar = `<b class="text-sm mr-3 shrink-0 bg-white border-2 border-blue-200 w-8 h-8 flex items-center justify-center rounded-full text-blue-700 shadow-sm">${kunciTampil}</b> <div class="ql-editor p-0 min-h-0 flex-1 overflow-x-auto text-sm" style="padding:0;">${teksOptKunci}</div>`;
                        }

                        let divBahas = document.createElement('div');
                        divBahas.className = `kartu-bahas ${kelasStatus} bg-white p-6 md:p-8 rounded-3xl shadow-sm border ${warnaBorder} transition-all duration-300`;
                        
                        divBahas.innerHTML = `
                            <div class="flex flex-col md:flex-row md:items-start mb-6 border-b border-gray-100 pb-6">
                                <span class="bg-white border-2 font-black w-12 h-12 rounded-2xl flex items-center justify-center mr-6 shrink-0 text-xl shadow-sm mb-4 md:mb-0 text-gray-700">${i + 1}</span>
                                <div class="flex-1 w-full overflow-hidden">
                                    <div class="text-gray-800 text-base md:text-lg mb-5 leading-relaxed font-medium ql-editor">${htmlTanya}</div>
                                    
                                    <div class="space-y-3 mt-6">
                                        <div class="flex items-start bg-gray-50 border border-gray-200 rounded-xl p-3 shadow-sm max-w-full">
                                            <span class="px-3 py-1 rounded-lg text-[10px] font-black tracking-widest ${warnaLabel} mr-4 shrink-0 flex items-center">${iconStatus}</span>
                                            <div class="flex items-center flex-wrap flex-1 ${warnaJawab}">${htmlJawabanSiswa}</div>
                                        </div>
                                        
                                        ${(!isBenar && isBenar !== null) ? `
                                        <div class="flex items-start bg-blue-50 border border-blue-200 rounded-xl p-3 shadow-sm max-w-full">
                                            <span class="px-3 py-1 rounded-lg text-[10px] font-black tracking-widest text-blue-800 bg-white border border-blue-200 mr-4 shrink-0 flex items-center">KUNCI JAWABAN</span>
                                            <div class="flex items-center flex-wrap flex-1 text-blue-900">${htmlKunciBenar}</div>
                                        </div>` : ''}
                                    </div>
                                </div>
                            </div>
                            <div class="bg-gradient-to-r from-gray-50 to-white p-5 md:p-6 rounded-2xl border border-gray-100 relative mt-2">
                                <span class="absolute -top-3 left-6 bg-yellow-100 text-yellow-800 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest border border-white shadow-sm">💡 Penjelasan / Cara</span>
                                <div class="text-gray-700 mt-2 leading-relaxed text-sm ql-editor overflow-x-auto">${htmlBahas}</div>
                            </div>
                        `;
                        kontainer.appendChild(divBahas);
                    });

                    // PICU MESIN KaTeX
                    setTimeout(() => {
                        document.querySelectorAll('.ql-formula').forEach(el => {
                            let latex = el.getAttribute('data-value');
                            if(latex) { try { katex.render(latex, el, {throwOnError: false}); } catch(e){} }
                        });
                    }, 200);

                } else { document.getElementById('kontainerPembahasan').innerHTML = '<div class="text-center py-20 text-red-500 font-bold">Data ujian tidak ditemukan.</div>'; }
            } catch (error) { document.getElementById('kontainerPembahasan').innerHTML = '<div class="text-center py-20 text-red-500 font-bold">Gagal menarik data dari server.</div>'; }
        }

        // MESIN FILTER
        window.filterSoal = (kategori) => {
            ['semua', 'benar', 'salah', 'kosong'].forEach(id => { document.getElementById(`btn-filter-${id}`).className = "px-4 py-2 text-xs md:text-sm font-bold rounded-xl transition bg-gray-50 text-gray-600 border border-gray-200 flex-1 md:flex-none"; });
            document.getElementById(`btn-filter-${kategori}`).className = "px-4 py-2 text-xs md:text-sm font-bold rounded-xl transition bg-gray-800 text-white shadow-sm flex-1 md:flex-none";

            const semuaKartu = document.querySelectorAll('.kartu-bahas'); let jumlahTampil = 0;
            semuaKartu.forEach(kartu => {
                if (kategori === 'semua' || (kategori === 'benar' && kartu.classList.contains('status-benar')) || (kategori === 'salah' && kartu.classList.contains('status-salah')) || (kategori === 'kosong' && kartu.classList.contains('status-kosong'))) {
                    kartu.style.display = 'block'; jumlahTampil++;
                } else kartu.style.display = 'none';
            });

            let pesanKosong = document.getElementById('pesanFilterKosong');
            if (jumlahTampil === 0) {
                if(!pesanKosong) {
                    pesanKosong = document.createElement('div'); pesanKosong.id = 'pesanFilterKosong';
                    pesanKosong.className = 'text-center py-10 text-gray-400 font-medium border-2 border-dashed rounded-2xl mt-4';
                    pesanKosong.innerText = 'Tidak ada soal dalam kategori ini.';
                    document.getElementById('kontainerPembahasan').appendChild(pesanKosong);
                }
            } else if (pesanKosong) pesanKosong.remove();
        };

    </script>
</body>
</html>
