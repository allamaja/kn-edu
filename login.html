<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login KN-Edu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <a href="index.html" class="absolute top-4 left-4 md:top-8 md:left-8 bg-white/80 backdrop-blur text-slate-600 hover:text-blue-600 px-4 py-2 rounded-full font-semibold text-sm shadow-sm border border-slate-200 hover:shadow-md transition flex items-center z-50">
        <span class="mr-2">⬅️</span> Beranda
    </a>
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md mx-4">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">KN-Edu</h1>
            <p class="text-gray-500">Khairunnas Education Hub</p>
            <p class="text-gray-400">Portal Belajar & Ujian Mandiri</p>
        </div>

        <form id="loginForm" class="space-y-6">
            
            <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                        <input type="text" id="emailLogin" required placeholder="Masukkan Username" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm">
            </div>

            <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-xl">🔑</span>
                        </div>
                        <input type="password" id="password" placeholder="Masukkan kata sandi..." required class="w-full pl-12 pr-12 py-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-gray-700 font-medium placeholder-gray-400">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-blue-600 transition-colors focus:outline-none">
                            <span id="ikonMata" class="text-xl">👁️</span>
                        </button>
                    </div>

            <p id="pesanError" class="text-red-500 text-sm hidden text-center">
                Username atau Kata Sandi salah.
            </p>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                Masuk ke Portal 🚀
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="#" class="text-sm text-blue-600 hover:underline">Lupa Kata Sandi? Hubungi Guru</a>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        // BARU: Kita import fitur database untuk mengecek Role
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTd3H3E9baMGDQpHbJDBFzupuSaIUn0v0",
            authDomain: "smartkhairunnas.firebaseapp.com",
            projectId: "smartkhairunnas",
            storageBucket: "smartkhairunnas.firebasestorage.app",
            messagingSenderId: "3009868062",
            appId: "1:3009868062:web:f6d158a8aa60fabf91590f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app); // Nyalakan koneksi ke Database

        const formLogin = document.getElementById('loginForm');
        const pesanError = document.getElementById('pesanError');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Ambil input, hilangkan spasi, dan jadikan huruf kecil semua
            let inputUser = document.getElementById('emailLogin').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            // 2. MESIN PENYERAGAMAN DOMAIN
            let emailUntukFirebase = inputUser;
            if (!inputUser.includes('@')) {
                emailUntukFirebase = inputUser + '@smartkhairunnas.com';
            }

            Swal.fire({ title: 'Mencocokkan Kunci...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            try {
                // 3. Login menggunakan email yang sudah dimanipulasi
                const userCredential = await signInWithEmailAndPassword(auth, emailUntukFirebase, password);
                
                // Cek Role di Firestore
                const q = query(collection(db, "users"), where("email", "==", emailUntukFirebase));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const userData = querySnapshot.docs[0].data();
                    Swal.fire({icon: 'success', title: 'Akses Diberikan!', text: `Selamat datang, ${userData.nama}`, timer: 1500, showConfirmButton: false})
                    .then(() => {
                        if (userData.role === 'admin_yayasan') window.location.replace("dashboard-yayasan.html");
                        else if (userData.role === 'admin_sekolah') window.location.replace("dashboard-admin-sekolah.html");
                        else if (userData.role === 'guru') window.location.replace("dashboard-guru.html");
                        else window.location.replace("dashboard.html"); // default ke siswa
                    });
                } else {
                    Swal.fire('Error', 'Data pengguna tidak ditemukan di database.', 'error');
                    signOut(auth);
                }
            } catch (error) {
                Swal.fire('Login Gagal', 'Username atau password salah!', 'error');
            }
        });
        // Fitur Ikon Mata Password
        window.togglePassword = () => {
            const passInput = document.getElementById('password');
            const ikon = document.getElementById('ikonMata');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                ikon.innerText = '🙈'; // Ganti ikon mata tertutup
            } else {
                passInput.type = 'password';
                ikon.innerText = '👁️'; // Ganti ikon mata terbuka
            }
        };
    </script>
    <div class="absolute bottom-4 w-full text-center z-10">
        <p class="text-xs text-slate-500 font-medium">
            Dikembangkan oleh <span class="text-blue-600 font-bold">Tim IT Khairunnas - Allam</span>
            <br class="md:hidden" />
            <span class="hidden md:inline"> | </span> © 2026 Yayasan Pendidikan Khairunnas
        </p>
    </div>
</body>
</html>
