<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Seleksi PPDB - SmartKhairunnas</title>
    <link href="style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f3f4f6; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 selection:bg-amber-200">

    <div id="layarLogin" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden animate-fade-in border border-gray-100">
        <div class="bg-gradient-to-r from-amber-600 to-amber-700 p-8 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 text-9xl opacity-10">🎯</div>
            <div class="w-16 h-16 bg-white rounded-2xl mx-auto flex items-center justify-center text-3xl shadow-lg mb-4 relative z-10">🏫</div>
            <h1 class="text-2xl font-black text-white relative z-10 tracking-wide">PORTAL SELEKSI</h1>
            <p class="text-amber-100 text-sm mt-1 font-medium relative z-10">Penerimaan Peserta Didik Baru</p>
        </div>
        <div class="p-8">
            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100 mb-6">
                <p class="text-xs text-amber-800 text-center font-medium leading-relaxed">Silakan masukkan <b>PIN / Nomor Pendaftaran</b> yang telah diberikan oleh panitia untuk memulai ujian seleksi.</p>
            </div>
            <form id="formLoginPPDB" class="space-y-6">
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 text-center">Nomor Pendaftaran (PIN)</label>
                    <input type="text" id="inputPIN" required class="w-full px-4 py-4 text-center text-2xl tracking-[0.25em] font-black border-2 border-gray-200 rounded-2xl outline-none focus:border-amber-500 focus:ring-4 focus:ring-amber-500/20 transition text-gray-800 uppercase" placeholder="Ketik PIN..." autocomplete="off">
                </div>
                <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-black text-lg py-4 rounded-2xl shadow-lg shadow-amber-600/30 transition transform hover:-translate-y-1 flex items-center justify-center">
                    <span class="mr-2">🚀</span> Masuk Ruang Ujian
                </button>
            </form>
        </div>
    </div>

    <div id="layarRuangTunggu" class="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden hidden border border-gray-100">
        <div class="p-6 md:p-8 flex flex-col md:flex-row items-center gap-6 border-b border-gray-100">
            <div class="w-20 h-20 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center text-4xl font-black shrink-0">👨‍🎓</div>
            <div class="text-center md:text-left flex-1">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Peserta Seleksi</p>
                <h2 class="text-2xl font-black text-gray-800 leading-tight" id="infoNamaPeserta">Memuat...</h2>
                <p class="text-sm font-bold text-gray-500 mt-1" id="infoAsalSekolah">Asal: -</p>
            </div>
            <button onclick="keluarPPDB()" class="text-xs font-bold text-red-500 bg-red-50 px-4 py-2 rounded-xl hover:bg-red-100 transition">Batal / Keluar</button>
        </div>
        
        <div class="p-6 md:p-8 bg-gray-50">
            <h3 class="text-lg font-black text-gray-800 mb-4 border-b border-gray-200 pb-2">Jadwal Ujian Seleksi Anda</h3>
            <div id="kontainerJadwalPeserta" class="space-y-4">
                <div class="text-center py-8 text-gray-400 font-bold animate-pulse">Mencari jadwal seleksi...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyCTd3H3E9baMGDQpHbJDBFzupuSaIUn0v0",
            authDomain: "smartkhairunnas.firebaseapp.com",
            projectId: "smartkhairunnas",
            storageBucket: "smartkhairunnas.firebasestorage.app",
            messagingSenderId: "3009868062",
            appId: "1:3009868062:web:f6d158a8aa60fabf91590f"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let profilPPDB = null;

        // Sensor Waktu Akurat dari Server
        const ambilWaktuServer = async () => {
            try {
                const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Jakarta', { cache: 'no-store' });
                const data = await res.json();
                return new Date(data.datetime); 
            } catch (err) { return new Date(); }
        };

        // MESIN LOGIN PIN
        document.getElementById('formLoginPPDB').addEventListener('submit', async (e) => {
            e.preventDefault();
            let pin = document.getElementById('inputPIN').value.trim();
            if(!pin) return;

            Swal.fire({title: 'Memeriksa Data...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            
            try {
                // Cari data berdasarkan PIN/No. Pendaftaran di database
                const q = query(collection(db, "pendaftaran_ppdb"), where("no_pendaftaran", "==", pin));
                const snap = await getDocs(q);

                if(snap.empty) {
                    Swal.fire('Tidak Ditemukan', 'PIN / Nomor Pendaftaran tidak terdaftar. Silakan hubungi panitia.', 'error');
                } else {
                    profilPPDB = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    
                    // Simpan identitas ke memori browser agar ujian.html bisa membaca nanti
                    sessionStorage.setItem('sesi_ppdb_user', JSON.stringify(profilPPDB));

                    document.getElementById('infoNamaPeserta').innerText = profilPPDB.nama;
                    document.getElementById('infoAsalSekolah').innerText = `Asal: ${profilPPDB.asal_sekolah || '-'}`;
                    
                    document.getElementById('layarLogin').classList.add('hidden');
                    document.getElementById('layarRuangTunggu').classList.remove('hidden');
                    Swal.close();

                    muatJadwalSeleksi();
                }
            } catch(er) {
                console.error(er);
                Swal.fire('Error', 'Gagal terhubung ke server.', 'error');
            }
        });

        // MESIN PENCARI JADWAL SELEKSI KHUSUS
        // MESIN PENCARI JADWAL SELEKSI KHUSUS (DENGAN FILTER JALUR)
        const muatJadwalSeleksi = async () => {
            let kontainer = document.getElementById('kontainerJadwalPeserta');
            try {
                let waktuSekarang = await ambilWaktuServer();
                
                // Ambil data profil dari session
                let profilSiswa = JSON.parse(sessionStorage.getItem('sesi_ppdb_user'));
                let targetKelasSiswa = profilSiswa.target_kelas || "6"; // Default jika tidak ada
                
                const qJadwal = query(collection(db, "jadwal_ujian"), where("aturan_rilis_bahas", "==", "mode_ppdb"), where("status", "==", "aktif"));
                const snapJadwal = await getDocs(qJadwal);
                
                let html = ''; let count = 0;
                
                snapJadwal.forEach(doc => {
                    let j = doc.data(); j.id = doc.id;
                    
                    // Filter 1: Kepemilikan Sekolah
                    let isPusat = !j.sekolah_id || j.sekolah_id === "GLOBAL" || j.sekolah_id === "YAYASAN";
                    if(!isPusat && j.sekolah_id !== profilPPDB.sekolah_id) return;
                    
                    // 🔥 Filter 2: KESESUAIAN JALUR/KELAS (Kunci Rahasianya!)
                    // Jadwal akan tampil JIKA:
                    // - Kelas di jadwal diset "PPDB" atau "Semua" (Berarti berlaku umum)
                    // - Kelas di jadwal SAMA PERSIS dengan target_kelas milik siswa
                    let isKelasCocok = j.kelas === "PPDB" || j.kelas === "Semua" || String(j.kelas) === String(targetKelasSiswa);
                    
                    if(!isKelasCocok) return; // Jika tidak cocok, lompat ke jadwal berikutnya
                    
                    count++;
                    let wMulai = new Date(j.waktu_mulai);
                    let wSelesai = new Date(j.waktu_selesai);
                    
                    let stHtml = "", btnHtml = "";
                    
                    if (waktuSekarang < wMulai) {
                        stHtml = '<span class="text-amber-600 bg-amber-100 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border border-amber-200">⏳ Belum Mulai</span>';
                        btnHtml = '<button class="w-full bg-gray-200 text-gray-400 font-bold py-3 rounded-xl cursor-not-allowed">Terkunci</button>';
                    } else if (waktuSekarang >= wMulai && waktuSekarang <= wSelesai) {
                        stHtml = '<span class="text-emerald-600 bg-emerald-100 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border border-emerald-200 animate-pulse">🟢 Tersedia</span>';
                        btnHtml = `<button onclick="masukUjianPPDB('${j.id}')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-3 rounded-xl shadow-lg transition transform hover:-translate-y-1">Mulai Mengerjakan</button>`;
                    } else {
                        stHtml = '<span class="text-gray-500 bg-gray-200 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border border-gray-300">✅ Ditutup</span>';
                        btnHtml = '<button class="w-full bg-gray-100 text-gray-400 font-bold py-3 rounded-xl cursor-not-allowed">Selesai</button>';
                    }

                    let tglTampil = wMulai.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

                    html += `
                    <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-blue-100 text-blue-700 text-[9px] font-black px-3 py-1 rounded-bl-xl border-b border-l border-blue-200">JALUR KELAS ${j.kelas === 'PPDB' ? 'UMUM' : j.kelas}</div>
                        
                        <div class="flex justify-between items-start mb-4 mt-2">
                            <div>
                                <h4 class="font-black text-gray-800 text-lg leading-tight mb-1">${j.nama_ujian}</h4>
                                <p class="text-xs font-bold text-gray-500">Total Soal: ${j.jumlah_soal} Butir | ⏳ ${j.durasi_menit} Menit</p>
                            </div>
                            <div>${stHtml}</div>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 mb-4 text-xs font-bold text-gray-600 flex justify-between items-center">
                            <span>📅 ${tglTampil}</span>
                            <span>🕒 ${wMulai.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})} - ${wSelesai.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})} WIB</span>
                        </div>
                        ${btnHtml}
                    </div>`;
                });

                kontainer.innerHTML = count > 0 ? html : '<div class="text-center py-8 bg-white border border-dashed rounded-2xl text-gray-400 font-bold">Belum ada jadwal seleksi yang ditugaskan untuk jalur Anda.</div>';
                
            } catch(e) {
                console.error(e);
                kontainer.innerHTML = '<div class="text-center py-8 text-red-500 font-bold">Gagal memuat jadwal.</div>';
            }
        };

        // EKSEKUSI MASUK UJIAN
        window.masukUjianPPDB = (idJadwal) => {
            Swal.fire({
                title: 'Perhatian!', 
                html: "Waktu akan langsung berjalan setelah tombol diklik. Pastikan koneksi stabil.<br><br><b class='text-red-500'>Dilarang keluar dari aplikasi selama ujian berlangsung!</b>", 
                icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Saya Siap!', confirmButtonColor: '#059669', cancelButtonText: 'Nanti Dulu'
            }).then(r => {
                if(r.isConfirmed) {
                    // Set flag bahwa ini adalah sesi PPDB + Simpan ID Jadwal
                    sessionStorage.setItem('id_jadwal_aktif', idJadwal);
                    sessionStorage.setItem('mode_ujian', 'PPDB'); // Flag Penting
                    window.location.href = "ujian.html"; // Lempar ke halaman ujian
                }
            });
        };

        window.keluarPPDB = () => {
            sessionStorage.removeItem('sesi_ppdb_user');
            window.location.reload();
        };
    </script>
</body>
</html>
